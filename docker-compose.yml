services:
  postgres-db:
    image: postgres:15
    container_name: postgres_local
    environment:
      POSTGRES_USER: ricardo
      POSTGRES_PASSWORD: 3136
      POSTGRES_DB: statistic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
